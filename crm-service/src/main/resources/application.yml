server:
  port: 8093

spring:
  application:
    name: crm-service

  datasource:
    url: jdbc:postgresql://localhost:5433/crmdb
    username: crm
    password: crm_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: localhost
      port: 6380

  cache:
    type: redis

jwt:
  secret: ${JWT_SECRET:c2hhcmVkLWNybS1kZXYtc2VjcmV0LWtleS1kby1ub3QtdXNlLWluLXByb2Q=}
  expiration-ms: 86400000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4210}
