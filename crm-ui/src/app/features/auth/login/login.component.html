<div class="login-page">
  <div class="login-card" [class.login-card--error]="error()">
    <div class="login-card__brand">
      <mat-icon>hub</mat-icon>
      <span>CRM</span>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="login-card__form">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email" required />
        @if (form.controls.email.hasError('required')) {
          <mat-error>Email is required</mat-error>
        } @else if (form.controls.email.hasError('email')) {
          <mat-error>Enter a valid email address</mat-error>
        }
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input
          matInput
          [type]="hidePassword() ? 'password' : 'text'"
          formControlName="password"
          autocomplete="current-password"
          required
        />
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="togglePasswordVisibility()"
          [attr.aria-label]="hidePassword() ? 'Show password' : 'Hide password'"
        >
          <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        @if (form.controls.password.hasError('required')) {
          <mat-error>Password is required</mat-error>
        }
      </mat-form-field>

      @if (error()) {
        <p class="login-card__error" role="alert">{{ error() }}</p>
      }

      <button mat-flat-button type="submit" class="login-card__submit" [disabled]="form.invalid || loading()">
        @if (loading()) {
          <mat-spinner diameter="20" />
        } @else {
          Sign In
        }
      </button>
    </form>

    <button type="button" class="login-card__forgot" disabled>Forgot password?</button>
  </div>
</div>
