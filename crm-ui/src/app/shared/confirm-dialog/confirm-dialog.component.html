<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>{{ data.message }}</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="cancel()">{{ data.cancelLabel ?? 'Cancel' }}</button>
  <button mat-flat-button type="button" class="confirm-dialog__confirm" (click)="confirm()">
    {{ data.confirmLabel ?? 'Delete' }}
  </button>
</mat-dialog-actions>
