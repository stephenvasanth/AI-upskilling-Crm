services:
  postgres:
    image: postgres:16
    container_name: crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: crmdb
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: crm-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: crm-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@crm.example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  crm-service:
    build: ./crm-service
    container_name: crm-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/crmdb
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    ports:
      - "8093:8093"
    volumes:
      - ./crm-service:/app
      - crm_service_m2:/root/.m2
    depends_on:
      - postgres
      - redis

  crm-ui:
    build: ./crm-ui
    container_name: crm-ui
    restart: unless-stopped
    ports:
      - "4210:4210"
    volumes:
      - ./crm-ui:/app
      - crm_ui_node_modules:/app/node_modules
    depends_on:
      - crm-service

volumes:
  postgres_data:
  redis_data:
  crm_service_m2:
  crm_ui_node_modules:
